apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-config
data:
  MODEL_NAME: "v1-production-iris"
---
apiVersion: v1
kind: Secret
metadata:
  name: ml-auth
type: Opaque
stringData:
  API_KEY: "secret-token-2024"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-api
  template:
    metadata:
      labels:
        app: ml-api
    spec:
      containers:
      - name: ml-container
        image: ml-predictor:v1
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"
        env:
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: ml-config
              key: MODEL_NAME
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: ml-auth
              key: API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
spec:
  type: NodePort
  selector:
    app: ml-api
  ports:
    - port: 80
      targetPort: 5000
